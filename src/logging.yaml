version: 1
disable_existing_loggers: false

filters:
  context_filter:
    (): utils.logger.ContextualFilter

formatters:
  standard:
    (): utils.logger.CustomFormatter
  plain:
    format: "[%(asctime)s] %(levelname)-8s | traceId: %(trace_id)s | userId: %(user_id)s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: standard
    filters:
      - context_filter

root:
  level: INFO
  handlers:
    - console

loggers:
  httpx:
    level: WARNING
  httpcore:
    level: WARNING
  uvicorn.access:
    level: WARNING
